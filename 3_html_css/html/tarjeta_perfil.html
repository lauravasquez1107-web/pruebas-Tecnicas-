<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarjeta de Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/tarjeta_perfil.css"/>
</head>
<body>

  <div class="card">
    <div class="banner"></div>

    <div class="card-body">
      <div class="avatar-wrapper">
        <div class="avatar">
          <img src="../css/foto perrito .jpg" alt="foto de perfil"/>
        </div>
      </div>

      <p class="name">Laura Vasquez</p>
      <p class="role">Desarrolladora Frontend</p>

      <hr class="divider" />

      <div class="stats">
        <div class="stat">
          <span class="stat-number">1</span>
          <span class="stat-label">Proyecto Reeal</span>
        </div>
        <div class="stat">
          <span class="stat-number">0</span>
          <span class="stat-label">Años Exp.</span>
        </div>
        <div class="stat">
          <span class="stat-number">50%</span>
          <span class="stat-label">Satisfacción</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
