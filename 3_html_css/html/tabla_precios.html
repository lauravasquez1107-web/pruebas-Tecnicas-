<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tabla de Precios</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/tabla_precios.css"/>
</head>
<body>

  <div class="section">
    <h2>Elige tu Plan</h2>

    <div class="plans">

      <div class="plan">
        <div class="plan-header">
          <p class="plan-name">Básico</p>
          <p class="plan-price">$9 <span>/mes</span></p>
        </div>
        <ul class="plan-features">
          <li>5 usuarios</li>
          <li>10 GB almacenamiento</li>
          <li>Soporte email</li>
        </ul>
        <button class="plan-btn">Comenzar</button>
      </div>

      <div class="plan featured">
        <div class="plan-header">
          <p class="plan-name">Pro</p>
          <p class="plan-price">$29 <span>/mes</span></p>
        </div>
        <ul class="plan-features">
          <li>50 usuarios</li>
          <li>100 GB almacenamiento</li>
          <li>Soporte 24/7</li>
        </ul>
        <button class="plan-btn">Comenzar</button>
      </div>

      <div class="plan enterprise">
        <div class="plan-header">
          <p class="plan-name">Enterprise</p>
          <p class="plan-price">$99 <span>/mes</span></p>
        </div>
        <ul class="plan-features">
          <li>Ilimitado</li>
          <li>1 TB almacenamiento</li>
          <li>Soporte dedicado</li>
        </ul>
        <button class="plan-btn">Comenzar</button>
      </div>

    </div>
  </div>

</body>
</html>
